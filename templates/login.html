<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Traffic Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-md rounded-3xl p-8 relative overflow-hidden">
        <!-- Decorative bg circle -->
        <div class="absolute -top-16 -right-16 w-48 h-48 bg-blue-100 rounded-full opacity-60 mix-blend-multiply blur-2xl"></div>
        <div class="absolute -bottom-16 -left-16 w-48 h-48 bg-indigo-100 rounded-full opacity-60 mix-blend-multiply blur-2xl"></div>

        <div class="relative z-10">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 text-white mb-6 shadow-lg shadow-blue-500/30">
                    <i class="fas fa-shield-alt text-2xl"></i>
                </div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-indigo-600 tracking-tight">Admin Portal</h1>
                <p class="text-slate-500 mt-2 text-sm">Secure access to traffic monitoring system</p>
            </div>

            {% if error %}
            <div class="mb-6 p-4 rounded-xl bg-red-50 border border-red-100 flex items-start space-x-3 transition-all duration-300">
                <i class="fas fa-exclamation-circle text-red-500 mt-0.5"></i>
                <p class="text-sm font-medium text-red-700">{{ error }}</p>
            </div>
            {% endif %}

            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2 ml-1">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i class="fas fa-user text-sm"></i>
                        </div>
                        <input type="text" name="username" placeholder="Enter username" required 
                            class="input-glass w-full pl-11 pr-4 py-3.5 rounded-xl text-slate-800 outline-none text-sm placeholder-slate-400">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2 ml-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i class="fas fa-lock text-sm"></i>
                        </div>
                        <input type="password" name="password" placeholder="Enter password" required 
                            class="input-glass w-full pl-11 pr-4 py-3.5 rounded-xl text-slate-800 outline-none text-sm placeholder-slate-400">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-medium py-3.5 px-4 rounded-xl hover:shadow-lg hover:shadow-blue-500/30 hover:-translate-y-0.5 transition-all duration-300 transform flex items-center justify-center space-x-2 relative overflow-hidden group">
                        <span class="relative z-10">Secure Login</span>
                        <i class="fas fa-arrow-right text-sm relative z-10 transition-transform group-hover:translate-x-1"></i>
                        <div class="absolute inset-0 h-full w-full bg-gradient-to-r from-indigo-600 to-blue-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    </button>
                </div>
            </form>
            
            <div class="mt-8 text-center text-xs text-slate-400">
                <p>&copy; 2026 Smart Traffic Monitoring System</p>
            </div>
        </div>
    </div>

</body>
</html>
